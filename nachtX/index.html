<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snorren Speltool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <br>
    <div class="container bg-dark text-white p-3 rounded">
        <div class="container bg-dark text-white p-3 rounded">
        <div class="row align-items-center">
            <div class="col-9">
                <h1>De Dag en de Nacht</h1>
            </div>
            <div class="col-3">
                <a type="button" class="btn btn-secondary" href="../">Terug naar home</a>
            </div>
        </div>
        <br>

        <div class="container">
            <ul id="settingDisplay" class="">
                <li id="themaDisplay">Placeholder</li>
                <li id="playerCountDisplay">Placeholder</li>
            </ul>
        </div>


        <div class="container">
            <h2> Spelers</h3>
            <div id="spelersContainer">

            </div>

        </div>


        <div class="container">
            <div id="dayContainer" class="container">
                <h3>Dag</h3>
                <div>
                    <h5 id="groupName">NaamRole</h5>
                    <h7 id="roleTooltip">ToolTip</h7>
                </div>

            </div>

        </div>
        <br>
        <br>
        <div class="container mt-3">
            <div class="d-grid gap-2">
                <button id="endNacht1Button" class="btn btn-primary" type="button">Sla gegevens op en ga naar Nacht X</button>
            </div>
        </div>

        <template id="nameFieldTemplate">
            <h5 id="groupName">NaamRole</h5>
            <h7 id="roleTooltip">ToolTip</h7>
        </template>

        <template id="roleTemplate">
            <div id="roleInput" class="input-group mb-3">
                <span class="input-group-text" id="naamRole">NaamRole</span>
                <input id="roleInputField" type="text" class="form-control" placeholder="Naam van speler" aria-label="Username" aria-describedby="naamRole">
            </div>
        </template>

    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="js/nachtX.js"></script>
  



</body>



</html>
