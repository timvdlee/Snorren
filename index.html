<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snorren Speltool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <br>
    <div class="container bg-dark text-white p-3 rounded">
        <div class="row align-items-center">
            <div class="col-6">
                <h1> Snorren Spelleider support tool</h1>
            </div>
            <div class="col-3">
                <a type="button" class="btn btn-primary" href="/Snorren/nacht1/">Hervat nacht 1</a>
            </div>
            <div class="col-3">
                <a type="button" class="btn btn-secondary" href="/Snorren/nachtX/">Hervat nacht x</a>
            </div>
        </div>
        <br>


        <div class="container">
            <h2>Selecteer Thema</h2>
            <select id="themaSelect" class="form-select" aria-label="Thema">
                <option value="Standaard" selected>Standaard (Wo2) </option>
                <option value="Circus">Circus</option>
                <option value="Piraten">Piraten</option>
                <option value="Viking">Viking</option>
            </select>
        </div>

        <div class="container">
            <h2>Selecteer Aantal spelers</h2>
            <select id="aantalSpelersSelect" class="form-select" aria-label="Aantal spelers">
                <option value="8" selected>8 spelers </option>
                <option value="9" >9 spelers </option>
                <option value="10">10 spelers </option>
                <option value="11">11 spelers </option>
                <option value="12">12 spelers </option>
                <option value="13">13 spelers </option>
                <option value="14">14 spelers </option>
                <option value="15">15 spelers </option>
                <option value="16">16 spelers </option>
                <option value="17">17 spelers </option>
                <option value="18">18 spelers </option>
            </select>
        </div>
        <div class="container mt-3">
            <h2>Geselecteerde Rollen</h2>
            <ul id="roleList" class="">
                <!-- Dynamically populated list of roles will appear here -->
            </ul>


   
        <div class="container mt-3">
            <div class="d-grid gap-2">
                <button id="startSpelButton" class="btn btn-primary" type="button">Start Spel</button>
            </div>
        </div>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="js/cardHelper.js"></script>
  
</body>
</html>
